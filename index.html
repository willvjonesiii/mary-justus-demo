<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mary Justus — The Architecture of Conscious Healing</title>
<meta name="description" content="Psychospiritual healing with Mary Justus. Reiki, polarity therapy, somatic work, and trauma-informed sessions in Hillsborough, NC.">
<link rel="icon" type="image/png" href="https://designmywebsitenow.com/images/favicon-merkaba.png">
<link rel="apple-touch-icon" href="https://designmywebsitenow.com/images/favicon-merkaba.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Cormorant+Garamond:ital,wght@0,300;1,400;1,500;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#f7f4ee;
  --ink:#2a2620;
  --ink-soft:#5c5648;
  --gold:#c9973f;
  --gold-lt:#f0cb8a;
  --gold-dk:#8a662a;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:var(--ivory);
  color:var(--ink);
  font-family:'Jost',sans-serif;
  font-weight:300;
  overflow:hidden;
}
.hero{position:relative;width:100vw;height:100dvh;overflow:hidden;}
#helixCanvas{position:absolute;inset:0;width:100%;height:100%;display:block;}

.mark{
  position:absolute;top:2rem;left:2.2rem;z-index:5;
  font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;
  letter-spacing:0.02em;color:var(--ink);opacity:0;transition:opacity 1.2s ease 0.3s;
}
.mark.show{opacity:0.88;}
.mark sup{font-style:normal;font-size:0.55rem;vertical-align:super;}

.menu-dot{
  position:absolute;top:1.8rem;right:2rem;z-index:5;
  width:44px;height:44px;border-radius:50%;background:var(--ivory);
  border:1px solid rgba(42,38,32,0.14);
  display:flex;align-items:center;justify-content:center;gap:3px;
  opacity:0;transition:opacity 1.2s ease 0.3s;
}
.menu-dot.show{opacity:1;}
.menu-dot span{width:3px;height:3px;border-radius:50%;background:var(--ink);display:block;}

.cluster{position:absolute;z-index:4;opacity:0;transform:translateY(16px);transition:opacity 1.4s ease,transform 1.4s ease;}
.cluster.show{opacity:1;transform:none;}

.cluster-top{top:16%;left:6%;max-width:min(46vw,520px);}
.cluster-top .eyebrow{
  font-size:0.7rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--gold-dk);
  margin-bottom:1rem;font-weight:500;
}
.cluster-top h1{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;
  font-size:clamp(1.9rem,3.6vw,3.1rem);line-height:1.08;color:var(--ink);
}
.cluster-top .sub{
  margin-top:1.3rem;font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.05rem;color:var(--ink-soft);max-width:32ch;
}

.cluster-bottom{bottom:14%;right:5%;text-align:right;}
.cluster-bottom h2{
  font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;
  font-size:clamp(2.4rem,7vw,6.4rem);line-height:0.92;color:var(--ink);
  letter-spacing:0.005em;
}
.cluster-bottom h2 .accent{color:var(--gold);}

.chrome-bl{
  position:absolute;bottom:2rem;left:2.2rem;z-index:5;
  width:40px;height:40px;border-radius:50%;background:var(--ivory);
  border:1px solid rgba(42,38,32,0.14);display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 1.2s ease 0.5s;
}
.chrome-bl.show{opacity:1;}
.chrome-bl svg{width:16px;height:16px;}

.scroll-dot{
  position:absolute;bottom:2.2rem;left:50%;transform:translateX(-50%);z-index:5;
  width:34px;height:34px;border-radius:50%;border:1px solid rgba(42,38,32,0.25);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 1.2s ease 0.6s;
}
.scroll-dot.show{opacity:1;}
.scroll-dot::after{content:'';width:5px;height:5px;border-radius:50%;background:var(--gold);animation:pulseDot 2.4s ease-in-out infinite;}
@keyframes pulseDot{0%,100%{transform:scale(1);opacity:0.6;}50%{transform:scale(1.6);opacity:1;}}

.copyright{
  position:absolute;bottom:2.3rem;right:2.2rem;z-index:5;
  font-size:0.68rem;letter-spacing:0.06em;color:var(--ink-soft);
  opacity:0;transition:opacity 1.2s ease 0.5s;
}
.copyright.show{opacity:0.7;}

@media (max-width:900px){
  .cluster-top{max-width:80vw;}
  .cluster-bottom{right:6%;}
}
</style>
</head>
<body>

<section class="hero">
  <canvas id="helixCanvas"></canvas>

  <div class="mark" id="mark">Mary Justus<sup>®</sup></div>
  <div class="menu-dot" id="menuDot"><span></span><span></span><span></span></div>

  <div class="cluster cluster-top" id="clusterTop">
    <p class="eyebrow">The Architecture of Conscious Healing</p>
    <h1>Come home to<br>your true self</h1>
    <p class="sub">There is a quiet miracle in the mystery of meeting.</p>
  </div>

  <div class="cluster cluster-bottom" id="clusterBottom">
    <h2>Shine your<br><span class="accent">light</span></h2>
  </div>

  <div class="chrome-bl" id="chromeBl">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="3"></circle><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"></path></svg>
  </div>
  <div class="scroll-dot" id="scrollDot"></div>
  <div class="copyright" id="copyright">© 2026</div>
</section>

<script>
(function () {
  const canvas = document.getElementById('helixCanvas');
  const ctx = canvas.getContext('2d');
  let w, h, dpr = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    w = window.innerWidth; h = window.innerHeight;
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const STEPS = 70;
  const TURNS = 3.4;
  let phase = 0;

  function axis() {
    return {
      ax: w * 0.66, ay: h * 0.06,
      bx: w * 0.30, by: h * 0.98
    };
  }

  function buildPoints() {
    const { ax, ay, bx, by } = axis();
    const dx = bx - ax, dy = by - ay;
    const len = Math.hypot(dx, dy);
    const dirx = dx / len, diry = dy / len;
    const perpx = -diry, perpy = dirx;
    const radius = Math.min(w, h) * 0.1;
    const pts = [];
    for (let strand = 0; strand < 2; strand++) {
      for (let i = 0; i <= STEPS; i++) {
        const t = i / STEPS;
        const angle = t * TURNS * Math.PI * 2 + phase + strand * Math.PI;
        const perpOffset = Math.cos(angle) * radius;
        const depthZ = Math.sin(angle);
        const cx = ax + dirx * t * len;
        const cy = ay + diry * t * len;
        const x = cx + perpx * perpOffset;
        const y = cy + perpy * perpOffset;
        pts.push({ x, y, z: depthZ, t, strand, i });
      }
    }
    return pts;
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    const pts = buildPoints();

    ctx.lineWidth = 1;
    for (let strand = 0; strand < 2; strand++) {
      const strandPts = pts.filter(p => p.strand === strand);
      ctx.beginPath();
      strandPts.forEach((p, idx) => {
        if (idx === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
      });
      ctx.strokeStyle = 'rgba(201,151,63,0.22)';
      ctx.stroke();
    }

    for (let i = 0; i <= STEPS; i += 3) {
      const a = pts.find(p => p.strand === 0 && p.i === i);
      const b = pts.find(p => p.strand === 1 && p.i === i);
      if (!a || !b) continue;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = 'rgba(42,38,32,0.08)';
      ctx.stroke();
    }

    const spherePts = pts.filter((p, idx) => idx % 2 === 0).sort((a, b) => a.z - b.z);
    spherePts.forEach(p => {
      const scale = 1 + p.z * 0.45;
      const r = Math.max(1.6, 4.2 * scale);
      const alpha = 0.5 + (p.z * 0.5 + 0.5) * 0.5;
      const lightX = p.x - r * 0.4, lightY = p.y - r * 0.4;
      const grad = ctx.createRadialGradient(lightX, lightY, 0.2, p.x, p.y, r * 1.3);
      grad.addColorStop(0, `rgba(240,203,138,${alpha})`);
      grad.addColorStop(0.55, `rgba(201,151,63,${alpha * 0.9})`);
      grad.addColorStop(1, `rgba(138,102,42,${alpha * 0.5})`);
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    });

    phase += 0.0035;
    requestAnimationFrame(draw);
  }
  draw();
})();

window.addEventListener('DOMContentLoaded', () => {
  ['mark','menuDot','clusterTop','clusterBottom','chromeBl','scrollDot','copyright'].forEach(id => {
    document.getElementById(id).classList.add('show');
  });
});
</script>
</body>
</html>
